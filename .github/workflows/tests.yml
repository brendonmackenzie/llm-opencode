name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.14"
      - run: uv sync --extra test
      - name: Type check
        run: uv run ty check
      - name: Run tests
        env:
          OPENCODE_KEY: ${{ secrets.OPENCODE_KEY || 'sk-test' }}
        run: uv run pytest
